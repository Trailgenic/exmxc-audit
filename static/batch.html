<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EEI Batch Dashboard — exmxc.ai</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #f9fafb;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .score-bar {
      height: 10px;
      border-radius: 9999px;
      background: linear-gradient(90deg, #dc2626 0%, #facc15 40%, #22c55e 80%);
    }
    .json-box {
      background-color: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      white-space: pre-wrap;
      overflow-x: auto;
    }
  </style>
</head>

<body class="max-w-6xl mx-auto py-10 px-5">

  <!-- Page Header -->
  <h1 class="text-3xl font-bold text-gray-900 text-center mb-2">
    EEI Batch Dashboard
  </h1>
  <p class="text-center text-gray-600 text-sm mb-8">
    Entity Engineering<sup>™</sup> — vertical audit & leaderboard
  </p>

  <!-- Run Button -->
  <div class="flex justify-center mb-8">
    <button id="runBatch"
      class="bg-black text-white px-5 py-2 rounded-lg text-sm hover:bg-gray-800 transition">
      Run Batch Audit
    </button>
  </div>

  <!-- Summary Header -->
  <div id="summaryBox" class="hidden bg-white border border-gray-200 rounded-xl p-5 mb-8 shadow-sm">
    <div id="summaryText" class="text-lg font-semibold text-gray-900 mb-2"></div>
    <div class="w-full bg-gray-200 h-3 rounded-full overflow-hidden">
      <div id="summaryBar" class="score-bar w-0"></div>
    </div>
  </div>

  <!-- Leaderboard -->
  <h2 class="text-xl font-bold mb-3">Leaderboard</h2>
  <div id="leaderboard" class="divide-y divide-gray-200 bg-white border border-gray-200 rounded-xl shadow-sm"></div>

  <script>
    const runBtn = document.getElementById("runBatch");
    const leaderboard = document.getElementById("leaderboard");
    const summaryBox = document.getElementById("summaryBox");
    const summaryText = document.getElementById("summaryText");
    const summaryBar = document.getElementById("summaryBar");

    function createRow(site) {
      const container = document.createElement("div");
      container.className = "p-4 hover:bg-gray-50 transition";

      container.innerHTML = `
        <div class="flex justify-between items-center cursor-pointer">
          <div>
            <div class="font-semibold text-gray-900">${site.entityName || site.hostname || site.url}</div>
            <div class="text-xs text-gray-500">${site.url}</div>
          </div>
          <div class="text-right">
            <div class="font-semibold text-gray-900">${site.entityScore} / 100</div>
            <div class="w-40 h-2 bg-gray-200 rounded-full overflow-hidden">
              <div class="score-bar" style="width:${site.entityScore}%;"></div>
            </div>
          </div>
        </div>

        <!-- Expand Section -->
        <div class="hidden mt-4 p-4 bg-gray-50 rounded-lg space-y-3 text-sm">
          <div><span class="font-semibold">Stage:</span> ${site.entityStage}</div>
          <div><span class="font-semibold">Focus:</span> ${site.entityFocus}</div>
          <div><span class="font-semibold">Updated:</span> ${site.timestamp}</div>

          <h4 class="font-semibold mt-2">Signals</h4>
          <div class="space-y-2">
            ${site.signals
              .map(
                (sig) => `
                <div>
                  <div class="flex justify-between">
                    <span>${sig.key}</span>
                    <span>${sig.points} / ${sig.max}</span>
                  </div>
                  <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-2 bg-gradient-to-r from-red-500 via-yellow-400 to-green-500 rounded-full"
                         style="width:${Math.round((sig.points / sig.max) * 100)}%;">
                    </div>
                  </div>
                </div>`
              )
              .join("")}
          </div>

          <h4 class="font-semibold mt-3">Raw JSON</h4>
          <pre class="json-box">${JSON.stringify(site, null, 2)}</pre>
        </div>
      `;

      // Expand toggle
      const expandSection = container.children[1];
      container.children[0].addEventListener("click", () => {
        expandSection.classList.toggle("hidden");
      });

      return container;
    }

    runBtn.addEventListener("click", async () => {
      leaderboard.innerHTML = "<div class='p-4 text-center text-gray-500'>Loading...</div>";

      const res = await fetch("/api/batch-run");
      const data = await res.json();

      const sorted = [...data.results].sort((a, b) => b.entityScore - a.entityScore);

      // Leaderboard
      leaderboard.innerHTML = "";
      sorted.forEach((site) => leaderboard.appendChild(createRow(site)));

      // Summary
      summaryBox.classList.remove("hidden");
      summaryText.textContent = `Average EEI Score: ${data.avgEntityScore}`;
      summaryBar.style.width = `${data.avgEntityScore}%`;
    });
  </script>
</body>
</html>
