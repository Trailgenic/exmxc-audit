<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EEI Single URL Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background-color: #f9fafb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, sans-serif;
      }
      .json-box {
        background-color: #0f172a;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: 0.75rem;
        font-size: 0.9rem;
        white-space: pre-wrap;
        overflow-x: auto;
      }
    </style>
  </head>

  <body class="max-w-5xl mx-auto py-10 px-5">
    <h1 class="text-3xl font-bold text-gray-900 text-center mb-4">
      EEI Single URL Audit
    </h1>

    <!-- Input -->
    <div class="flex justify-center gap-2 mb-6">
      <input
        id="urlInput"
        type="text"
        placeholder="example.com"
        class="border border-gray-300 rounded-lg px-3 py-2 w-2/3 text-sm focus:ring-2 focus:ring-black"
      />
      <button
        id="runButton"
        class="bg-black text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-800 transition"
      >
        Run Audit
      </button>
    </div>

    <!-- Score Box -->
    <div
      class="bg-amber-50 border border-amber-200 rounded-xl p-6 mb-10 text-center shadow-sm"
    >
      <div id="scoreDisplay" class="text-xl font-semibold mb-2">
        EEI: -- / 100
      </div>

      <div class="relative w-full h-3 bg-gray-200 rounded-full overflow-hidden mb-2">
        <div id="scoreBar" class="h-3 w-0 rounded-full"></div>
      </div>

      <div id="entityStage" class="text-lg font-semibold text-gray-900"></div>
      <div id="entityVerb" class="text-sm text-gray-700 mt-1"></div>
    </div>

    <!-- Signals -->
    <h2 class="text-xl font-bold text-gray-900 text-center mb-4">Signals</h2>
    <div id="signalBreakdown" class="mb-10 text-sm text-gray-800"></div>

    <!-- Raw JSON -->
    <h2 class="text-xl font-bold text-gray-900 text-center mt-10 mb-2">
      Raw JSON
    </h2>
    <pre id="result" class="json-box">// Awaiting input...</pre>

    <footer class="text-center text-xs text-gray-500 mt-10">
      Powered by <span class="font-semibold text-black">exmxc.ai</span>
    </footer>

    <!-- SCRIPT -->
    <script>
      const runButton = document.getElementById("runButton");
      const resultEl = document.getElementById("result");
      const scoreBar = document.getElementById("scoreBar");
      const scoreDisplay = document.getElementById("scoreDisplay");
      const entityStage = document.getElementById("entityStage");
      const entityVerb = document.getElementById("entityVerb");
      const signalBreakdown = document.getElementById("signalBreakdown");

      runButton.addEventListener("click", async () => {
        const input = document.getElementById("urlInput").value.trim();
        if (!input) return alert("Please enter a URL.");

        resultEl.textContent = "Loading...";

        try {
          const url = input.startsWith("http") ? input : `https://${input}`;

          const res = await fetch(
            `https://exmxc-audit.vercel.app/api/audit?url=${encodeURIComponent(
              url
            )}`,
            {
              headers: { "x-exmxc-key": "exmxc-internal" },
            }
          );

          const data = await res.json();

          // Score
          const score = data.entityScore ?? 0;
          scoreDisplay.textContent = `EEI: ${score} / 100`;
          scoreBar.style.width = `${score}%`;
          scoreBar.style.background =
            "linear-gradient(90deg, #dc2626 0%, #facc15 40%, #22c55e 80%)";

          // Stage + Verb
          entityStage.textContent = data.entityStage || "";
          entityVerb.textContent = data.entityVerb
            ? `${data.entityVerb} — ${data.entityDescription}`
            : "";

          /* ------------------------------------
             SIGNAL BREAKDOWN (full gradient bars)
          ------------------------------------ */
          signalBreakdown.innerHTML = "";
          if (data.signals && data.signals.length > 0) {
            data.signals.forEach((sig) => {
              const category = sig.key || "Signal";
              const points = sig.points || 0;
              const max = sig.max || 10;
              const percent = Math.round((points / max) * 100);
              const notes = sig.notes
                ? `<div class="text-xs text-gray-500 mt-1">${sig.notes}</div>`
                : "";

              const row = document.createElement("div");
              row.className = "mb-4";

              row.innerHTML = `
                <div class="flex justify-between items-center mb-1">
                  <span class="font-medium">${category}</span>
                  <span>${points} / ${max}</span>
                </div>

                <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
                  <div
                    class="h-3 rounded-full"
                    style="
                      width:${percent}%;
                      background: linear-gradient(
                        90deg,
                        #dc2626 0%,
                        #facc15 40%,
                        #22c55e 80%
                      );
                    "
                  ></div>
                </div>

                ${notes}
              `;

              signalBreakdown.appendChild(row);
            });
          }

          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          resultEl.textContent = JSON.stringify(
            { error: err.message },
            null,
            2
          );
        }
      });
    </script>
  </body>
</html>
