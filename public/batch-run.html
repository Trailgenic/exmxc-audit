<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Audit — exmxc.ai</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="max-w-5xl mx-auto py-10 px-5 bg-gray-50">

  <h1 class="text-3xl font-bold text-gray-900 text-center mb-2">
    exmxc.ai Batch Audit
  </h1>
  <p class="text-center text-gray-600 text-sm mb-6">
    Run multi-site EEI batch audits (media, health, web, competitors)
  </p>

  <!-- RUN BUTTONS -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">

    <button onclick="runBatch('core-media')"
      class="bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
      Media Batch
    </button>

    <button onclick="runBatch('core-health')"
      class="bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
      Health Batch
    </button>

    <button onclick="runBatch('core-web')"
      class="bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
      Web Batch
    </button>

    <button onclick="runBatch('core-results')"
      class="bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
      Competitor Batch
    </button>

  </div>

  <!-- RESULTS -->
  <h2 class="text-xl font-semibold mb-3 text-gray-900">Batch Results</h2>
  <pre id="output" class="bg-slate-900 text-slate-200 p-4 rounded-lg text-sm overflow-auto h-[500px]">
// Awaiting batch selection...
  </pre>

<script>
  async function runBatch(name) {
    const output = document.getElementById("output");
    output.textContent = `Running ${name}...`;

    try {
      const res = await fetch(`/api/batch?file=${name}`);
      const data = await res.json();

      output.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      output.textContent = JSON.stringify({ error: err.message }, null, 2);
    }
  }
</script>

</body>
</html>
